<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Mini WhatsApp Login</title>
    <link rel="stylesheet" href="css/app.css">
</head>
<body>
    <div class="login-container">
        <h1>Mini WhatsApp LAN</h1>
        <form id="loginForm">
            <input type="text" id="name-input" placeholder="Your Name" required>
            <input type="text" id="ip-input" placeholder="Your IP" required pattern="^(\d{1,3}\.){3}\d{1,3}$" readonly>
            <button type="submit">Join Network</button>
        </form>
        <div id="ip-status" style="margin-top: 10px; font-size: 14px;"></div>
        <div id="ip-warning" style="margin-top: 10px; font-size: 14px; color: #f44336; display: none;">⚠️ Please connect to the hostel WiFi (192.168.x.x) to use this app.</div>
    </div>

    <script>
        function showToast(message, type = 'info') {
            const toast = document.createElement('div');
            toast.className = `toast toast-${type}`;
            toast.textContent = message;
            document.body.appendChild(toast);
            setTimeout(() => toast.classList.add('show'), 10);
            setTimeout(() => {
                toast.classList.remove('show');
                setTimeout(() => toast.remove(), 300);
            }, 3000);
        }

        async function autoFillIP() {
            const statusDiv = document.getElementById('ip-status');
            const ipInput = document.getElementById('ip-input');
            statusDiv.textContent = 'Detecting IP...';
            try {
                const response = await fetch('/myip');
                if (!response.ok) throw new Error('Server not reachable');
                const data = await response.json();
                ipInput.value = data.ip;
                statusDiv.textContent = 'IP detected automatically.';
                validateIPInput();
            } catch (err) {
                statusDiv.innerHTML = '⚠️ Server not reachable. Make sure you are connected to the hostel WiFi and the server is running.';
            }
        }

        function isHostelIP(ip) {
            const parts = ip.split('.').map(Number);
            return parts[0] === 192 && parts[1] === 168;
        }

        function validateIPInput() {
            const ipInput = document.getElementById('ip-input');
            const warningDiv = document.getElementById('ip-warning');
            const ip = ipInput.value.trim();
            const ipPattern = /^(\d{1,3}\.){3}\d{1,3}$/;
            if (!ipPattern.test(ip)) {
                warningDiv.style.display = 'none';
                return false;
            }
            const parts = ip.split('.').map(Number);
            const validRange = parts.every(part => part >= 0 && part <= 255);
            if (!validRange) {
                warningDiv.style.display = 'none';
                return false;
            }
            if (!isHostelIP(ip)) {
                warningDiv.style.display = 'block';
                return false;
            } else {
                warningDiv.style.display = 'none';
                return true;
            }
        }

        document.addEventListener('DOMContentLoaded', () => {
            autoFillIP();
            const ipInput = document.getElementById('ip-input');
            ipInput.addEventListener('input', validateIPInput);

            const loginForm = document.getElementById('loginForm');
            loginForm.addEventListener('submit', (e) => {
                e.preventDefault();
                const name = document.getElementById('name-input').value.trim();
                const ip = document.getElementById('ip-input').value.trim();
                if (!name || !ip) {
                    showToast('Enter both name and IP', 'warning');
                    return;
                }

                const ipPattern = /^(\d{1,3}\.){3}\d{1,3}$/;
                if (!ipPattern.test(ip)) {
                    showToast('Please enter a valid IP address', 'warning');
                    return;
                }
                const parts = ip.split('.');
                const valid = parts.every(part => {
                    const num = parseInt(part, 10);
                    return num >= 0 && num <= 255;
                });
                if (!valid) {
                    showToast('IP address parts must be between 0-255', 'warning');
                    return;
                }
                if (!isHostelIP(ip)) {
                    showToast('Please connect to the hostel WiFi (192.168.x.x) to use this app.', 'warning');
                    return;
                }

                localStorage.setItem('myName', name);
                localStorage.setItem('myIP', ip);
                window.location.href = 'app.html';
            });
        });
    </script>
</body>
</html>
